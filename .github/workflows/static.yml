# Nombre del flujo de trabajo
name: Deploy Vite/React to GitHub Pages

on:
  # Se ejecuta cada vez que haces push a la rama principal
  push:
    branches: ['main']
    
  # Permite ejecutar este flujo de trabajo manualmente desde la pestaña "Actions"
  workflow_dispatch:

# Otorga los permisos necesarios a GitHub Actions para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue concurrente, cancelando los anteriores que estén en curso
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Trabajo de despliegue único
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Instalar dependencias
        run: npm install
        
      - name: Construir proyecto (Build Vite)
        run: npm run build
        
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        
      - name: Subir artefacto dist
        uses: actions/upload-pages-artifact@v3
        with:
          # Esta es la carpeta que genera Vite por defecto
          path: './dist'
          
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

